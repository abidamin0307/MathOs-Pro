<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MultiTool Suite | Smart Calculators & Converters</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }

    body {
      background: #f1f5f9;
      color: #0f172a;
      padding: 2rem 1.5rem;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    .main-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .main-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e293b, #2c3e66);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .main-header p {
      color: #475569;
      margin-top: 0.5rem;
      font-size: 1rem;
    }

    /* Toolbar / Category Tabs */
    .tools-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 1rem;
    }

    .tool-btn {
      background: white;
      border: 1px solid #cbd5e1;
      padding: 0.6rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #334155;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .tool-btn:hover {
      background: #eef2ff;
      border-color: #94a3b8;
      transform: translateY(-1px);
    }

    .tool-btn.active {
      background: #1e293b;
      border-color: #1e293b;
      color: white;
      box-shadow: 0 6px 12px -8px rgba(0,0,0,0.2);
    }

    /* Card layout */
    .calculator-panel {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08);
      padding: 1.8rem 2rem;
      transition: all 0.2s;
      border: 1px solid #eef2ff;
    }

    .panel-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-desc {
      color: #475569;
      border-left: 3px solid #94a3b8;
      padding-left: 0.75rem;
      margin-bottom: 1.8rem;
      font-size: 0.9rem;
    }

    /* Grid for multi-tools */
    .calc-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .input-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
      background: #f8fafc;
      padding: 0.75rem 1rem;
      border-radius: 1.2rem;
    }

    .input-group label {
      font-weight: 600;
      min-width: 110px;
      color: #1e293b;
    }

    .input-group input, .input-group select {
      flex: 2;
      min-width: 180px;
      padding: 0.7rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 1.2rem;
      font-size: 1rem;
      background: white;
      transition: 0.2s;
    }

    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    button.calc-action {
      background: #0f172a;
      border: none;
      color: white;
      padding: 0.7rem 1.8rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }

    button.calc-action:hover {
      background: #1e293b;
      transform: scale(0.98);
    }

    .result-area {
      background: #f1f5f9;
      border-radius: 1.2rem;
      padding: 1rem 1.5rem;
      margin-top: 0.75rem;
      font-size: 1.1rem;
      font-weight: 500;
      border-left: 5px solid #3b82f6;
    }

    .result-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f172a;
      word-break: break-word;
    }

    hr {
      margin: 1rem 0;
      border-color: #e2e8f0;
    }

    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .calculator-panel {
        padding: 1.2rem;
      }
      .input-group {
        flex-direction: column;
        align-items: stretch;
      }
      .input-group label {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="main-header">
    <h1>⚡ MultiTool Suite</h1>
    <p>Financial | Health | Math | Converters — everything in one place</p>
  </div>

  <div class="tools-nav" id="toolsNav">
    <button data-tool="bmi" class="tool-btn active">🧮 BMI Calculator</button>
    <button data-tool="mortgage" class="tool-btn">🏠 Mortgage Calculator</button>
    <button data-tool="unitconv" class="tool-btn">📏 Unit Converter</button>
    <button data-tool="currency" class="tool-btn">💱 Currency Converter</button>
    <button data-tool="percentage" class="tool-btn">% Percentage Calc</button>
    <button data-tool="scientific" class="tool-btn">🔢 Basic & Scientific</button>
  </div>

  <div class="calculator-panel" id="calculatorPanel">
    <!-- dynamic content injected via JS -->
    <div id="toolContent">Loading smart tools...</div>
  </div>
</div>

<script>
  // ----- UTILITIES -----
  function formatNumber(num, decimals = 2) {
    if (isNaN(num)) return 'Invalid input';
    return Number(num).toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }

  // ---------- 1. BMI Calculator ----------
  function renderBMI() {
    return `
      <div class="calc-grid">
        <div class="panel-title">🧍 BMI Calculator (Metric / Imperial)</div>
        <div class="panel-desc">Body Mass Index: weight (kg) / height(m)²  |  or use lbs & inches</div>
        <div class="input-group">
          <label>🌡️ Weight</label>
          <input type="number" id="bmiWeight" placeholder="e.g., 70" step="any" value="70">
          <select id="bmiWeightUnit">
            <option value="kg">kg</option>
            <option value="lb">pounds (lb)</option>
          </select>
        </div>
        <div class="input-group">
          <label>📏 Height</label>
          <input type="number" id="bmiHeight" placeholder="e.g., 1.75" step="any" value="1.75">
          <select id="bmiHeightUnit">
            <option value="m">meters (m)</option>
            <option value="cm">cm</option>
            <option value="in">inches (in)</option>
          </select>
        </div>
        <button class="calc-action" id="calcBMI">Calculate BMI</button>
        <div class="result-area" id="bmiResult">📊 BMI: -- | Category: --</div>
      </div>
    `;
  }

  function attachBMI() {
    const btn = document.getElementById('calcBMI');
    if (!btn) return;
    btn.addEventListener('click', () => {
      let weight = parseFloat(document.getElementById('bmiWeight').value);
      let height = parseFloat(document.getElementById('bmiHeight').value);
      const weightUnit = document.getElementById('bmiWeightUnit').value;
      const heightUnit = document.getElementById('bmiHeightUnit').value;

      if (isNaN(weight) || isNaN(height)) {
        document.getElementById('bmiResult').innerHTML = '⚠️ Please enter valid numeric values.';
        return;
      }
      // Convert weight to kg
      if (weightUnit === 'lb') weight = weight * 0.45359237;
      // Convert height to meters
      let heightMeters = height;
      if (heightUnit === 'cm') heightMeters = height / 100;
      else if (heightUnit === 'in') heightMeters = height * 0.0254;
      else if (heightUnit === 'm') heightMeters = height;

      if (heightMeters <= 0) {
        document.getElementById('bmiResult').innerHTML = '❌ Height must be > 0';
        return;
      }
      const bmi = weight / (heightMeters * heightMeters);
      let category = '';
      if (bmi < 18.5) category = 'Underweight';
      else if (bmi < 25) category = 'Normal weight';
      else if (bmi < 30) category = 'Overweight';
      else category = 'Obese';
      document.getElementById('bmiResult').innerHTML = `📊 BMI: ${formatNumber(bmi, 1)} kg/m² &nbsp; | &nbsp; Category: ${category}`;
    });
  }

  // ---------- 2. Mortgage Calculator ----------
  function renderMortgage() {
    return `
      <div class="calc-grid">
        <div class="panel-title">🏡 Mortgage Payment Calculator</div>
        <div class="panel-desc">Monthly payment based on principal, annual interest, and loan term.</div>
        <div class="input-group"><label>💰 Loan Amount ($)</label><input type="number" id="loanAmount" value="250000" step="any"></div>
        <div class="input-group"><label>📅 Annual Interest Rate (%)</label><input type="number" id="interestRate" value="4.5" step="any"></div>
        <div class="input-group"><label>⏱️ Loan Term (years)</label><input type="number" id="loanYears" value="30" step="1"></div>
        <button class="calc-action" id="calcMortgage">Compute Monthly Payment</button>
        <div class="result-area" id="mortgageResult">💰 Monthly Payment: $---</div>
      </div>
    `;
  }

  function attachMortgage() {
    const btn = document.getElementById('calcMortgage');
    if (!btn) return;
    btn.addEventListener('click', () => {
      let principal = parseFloat(document.getElementById('loanAmount').value);
      let annualRate = parseFloat(document.getElementById('interestRate').value);
      let years = parseFloat(document.getElementById('loanYears').value);
      if (isNaN(principal) || isNaN(annualRate) || isNaN(years) || principal <= 0 || years <= 0) {
        document.getElementById('mortgageResult').innerHTML = '⚠️ Please enter valid positive numbers.';
        return;
      }
      const monthlyRate = annualRate / 100 / 12;
      const months = years * 12;
      let payment = 0;
      if (monthlyRate === 0) {
        payment = principal / months;
      } else {
        payment = principal * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1);
      }
      document.getElementById('mortgageResult').innerHTML = `💰 Monthly Payment: $${formatNumber(payment, 2)} &nbsp; | &nbsp; Total Payment: $${formatNumber(payment * months, 2)}`;
    });
  }

  // ---------- 3. Unit Converter (Length, Mass, etc) ----------
  function renderUnitConv() {
    return `
      <div class="calc-grid">
        <div class="panel-title">📐 Universal Unit Converter</div>
        <div class="panel-desc">Length, mass, temperature — convert between metric/imperial.</div>
        <div class="input-group"><label>📌 Category</label>
          <select id="convCategory">
            <option value="length">Length (meters, feet, inches, km, miles)</option>
            <option value="mass">Mass (kg, lb, g, oz)</option>
            <option value="temp">Temperature (°C, °F, K)</option>
          </select>
        </div>
        <div class="input-group"><label>🔢 Value</label><input type="number" id="convValue" value="1" step="any"></div>
        <div class="input-group"><label>⬅️ From Unit</label><select id="convFromUnit"></select></div>
        <div class="input-group"><label>➡️ To Unit</label><select id="convToUnit"></select></div>
        <button class="calc-action" id="doConvert">Convert</button>
        <div class="result-area" id="convResult">🔄 Result: --</div>
      </div>
    `;
  }

  const lengthUnits = { 'meter':1, 'kilometer':1000, 'centimeter':0.01, 'millimeter':0.001, 'mile':1609.344, 'yard':0.9144, 'foot':0.3048, 'inch':0.0254 };
  const massUnits = { 'kilogram':1, 'gram':0.001, 'milligram':0.000001, 'pound':0.45359237, 'ounce':0.028349523125 };
  function updateUnitOptions(category) {
    const fromSelect = document.getElementById('convFromUnit');
    const toSelect = document.getElementById('convToUnit');
    if (!fromSelect || !toSelect) return;
    let units = [];
    if (category === 'length') units = Object.keys(lengthUnits);
    else if (category === 'mass') units = Object.keys(massUnits);
    else if (category === 'temp') units = ['Celsius', 'Fahrenheit', 'Kelvin'];
    fromSelect.innerHTML = '';
    toSelect.innerHTML = '';
    units.forEach(u => {
      fromSelect.appendChild(new Option(u, u));
      toSelect.appendChild(new Option(u, u));
    });
    if (category === 'length') { fromSelect.value = 'meter'; toSelect.value = 'foot'; }
    else if (category === 'mass') { fromSelect.value = 'kilogram'; toSelect.value = 'pound'; }
    else { fromSelect.value = 'Celsius'; toSelect.value = 'Fahrenheit'; }
  }

  function convertUnit(value, fromUnit, toUnit, category) {
    if (category === 'length') {
      const meters = value * lengthUnits[fromUnit];
      return meters / lengthUnits[toUnit];
    } else if (category === 'mass') {
      const kg = value * massUnits[fromUnit];
      return kg / massUnits[toUnit];
    } else if (category === 'temp') {
      let celsius;
      if (fromUnit === 'Celsius') celsius = value;
      else if (fromUnit === 'Fahrenheit') celsius = (value - 32) * 5/9;
      else celsius = value - 273.15;
      if (toUnit === 'Celsius') return celsius;
      else if (toUnit === 'Fahrenheit') return celsius * 9/5 + 32;
      else return celsius + 273.15;
    }
    return NaN;
  }

  function attachUnitConv() {
    const catSelect = document.getElementById('convCategory');
    if (!catSelect) return;
    const update = () => updateUnitOptions(catSelect.value);
    catSelect.addEventListener('change', update);
    update();
    document.getElementById('doConvert')?.addEventListener('click', () => {
      let val = parseFloat(document.getElementById('convValue').value);
      if (isNaN(val)) { document.getElementById('convResult').innerHTML = '⚠️ Invalid number'; return; }
      const category = catSelect.value;
      const fromUnit = document.getElementById('convFromUnit').value;
      const toUnit = document.getElementById('convToUnit').value;
      const result = convertUnit(val, fromUnit, toUnit, category);
      if (isNaN(result)) document.getElementById('convResult').innerHTML = '❌ Conversion error';
      else document.getElementById('convResult').innerHTML = `🔄 ${val} ${fromUnit} = ${formatNumber(result, 4)} ${toUnit}`;
    });
  }

  // ---------- 4. Currency Converter (simulated live rates, but realistic static rates) ----------
  function renderCurrency() {
    return `
      <div class="calc-grid">
        <div class="panel-title">💱 Currency Converter (realistic base rates)</div>
        <div class="panel-desc">Convert between USD, EUR, GBP, JPY, INR, CAD, AUD.</div>
        <div class="input-group"><label>💰 Amount</label><input type="number" id="curAmount" value="100" step="any"></div>
        <div class="input-group"><label>From Currency</label><select id="curFrom"><option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option><option value="JPY">JPY</option><option value="INR">INR</option><option value="CAD">CAD</option><option value="AUD">AUD</option></select></div>
        <div class="input-group"><label>To Currency</label><select id="curTo"><option value="EUR">EUR</option><option value="USD">USD</option><option value="GBP">GBP</option><option value="JPY">JPY</option><option value="INR">INR</option><option value="CAD">CAD</option><option value="AUD">AUD</option></select></div>
        <button class="calc-action" id="convertCurrency">Convert</button>
        <div class="result-area" id="curResult">💵 Converted Amount: --</div>
      </div>
    `;
  }
  // base rates relative to USD (1 USD = x)
  const forexRates = { USD:1, EUR:0.92, GBP:0.79, JPY:148.2, INR:83.5, CAD:1.37, AUD:1.52 };
  function attachCurrency() {
    const btn = document.getElementById('convertCurrency');
    if (!btn) return;
    btn.addEventListener('click', () => {
      let amount = parseFloat(document.getElementById('curAmount').value);
      const from = document.getElementById('curFrom').value;
      const to = document.getElementById('curTo').value;
      if (isNaN(amount)) { document.getElementById('curResult').innerHTML = '⚠️ Enter valid amount'; return; }
      const inUSD = amount / forexRates[from];
      const converted = inUSD * forexRates[to];
      document.getElementById('curResult').innerHTML = `💵 ${formatNumber(amount,2)} ${from} = ${formatNumber(converted,2)} ${to} (live reference rates)`;
    });
  }

  // ---------- 5. Percentage Calculator ----------
  function renderPercentage() {
    return `
      <div class="calc-grid">
        <div class="panel-title">📊 Percentage Calculator (3 modes)</div>
        <div class="panel-desc">What is X% of Y? | X is what % of Y? | Percentage change.</div>
        <div class="input-group"><label>Mode</label><select id="pctMode"><option value="percentOf">🔹 X% of Y</option><option value="whatPercent">🔹 X is what % of Y</option><option value="change">🔹 Percentage change (from A to B)</option></select></div>
        <div id="pctDynamicInputs"></div>
        <button class="calc-action" id="calcPercent">Calculate</button>
        <div class="result-area" id="pctResult">📈 Result: --</div>
      </div>
    `;
  }
  function updatePctFields() {
    const mode = document.getElementById('pctMode').value;
    const container = document.getElementById('pctDynamicInputs');
    if (!container) return;
    if (mode === 'percentOf') {
      container.innerHTML = `<div class="input-group"><label>📌 Percentage (X)</label><input type="number" id="pctX" value="20" step="any"></div>
                             <div class="input-group"><label>📌 Number (Y)</label><input type="number" id="pctY" value="200" step="any"></div>`;
    } else if (mode === 'whatPercent') {
      container.innerHTML = `<div class="input-group"><label>🔢 Part (X)</label><input type="number" id="pctX" value="30" step="any"></div>
                             <div class="input-group"><label>🔢 Total (Y)</label><input type="number" id="pctY" value="150" step="any"></div>`;
    } else {
      container.innerHTML = `<div class="input-group"><label>📉 Original Value (A)</label><input type="number" id="pctA" value="80" step="any"></div>
                             <div class="input-group"><label>📈 New Value (B)</label><input type="number" id="pctB" value="100" step="any"></div>`;
    }
  }
  function attachPercentage() {
    const modeSelect = document.getElementById('pctMode');
    if(modeSelect) modeSelect.addEventListener('change', updatePctFields);
    updatePctFields();
    const btn = document.getElementById('calcPercent');
    if(btn) btn.addEventListener('click', () => {
      const mode = document.getElementById('pctMode').value;
      let result = 0;
      let msg = '';
      if(mode === 'percentOf') {
        const pct = parseFloat(document.getElementById('pctX').value);
        const num = parseFloat(document.getElementById('pctY').value);
        if(isNaN(pct)||isNaN(num)){ msg = 'Invalid numbers'; }
        else { result = (pct/100)*num; msg = `${pct}% of ${num} = ${formatNumber(result,2)}`; }
      } else if(mode === 'whatPercent') {
        const part = parseFloat(document.getElementById('pctX').value);
        const total = parseFloat(document.getElementById('pctY').value);
        if(isNaN(part)||isNaN(total)|| total===0) msg = 'Invalid / total zero';
        else { result = (part/total)*100; msg = `${part} is ${formatNumber(result,2)}% of ${total}`; }
      } else {
        const oldVal = parseFloat(document.getElementById('pctA').value);
        const newVal = parseFloat(document.getElementById('pctB').value);
        if(isNaN(oldVal)||isNaN(newVal)|| oldVal===0) msg = 'Invalid values (original cannot be zero)';
        else { result = ((newVal - oldVal)/Math.abs(oldVal))*100; msg = `Change: ${formatNumber(result,2)}% (${newVal > oldVal ? 'increase' : 'decrease'})`; }
      }
      document.getElementById('pctResult').innerHTML = `📈 Result: ${msg}`;
    });
  }

  // ---------- 6. Basic + Scientific style calculator (live expression) ----------
  function renderScientific() {
    return `
      <div class="calc-grid">
        <div class="panel-title">🔢 Smart Expression Calculator</div>
        <div class="panel-desc">Supports + - * / ^ (power), sqrt(), sin, cos, tan, log, ln, π, e. (JavaScript math)</div>
        <div class="input-group"><label>🧮 Expression</label><input type="text" id="exprInput" placeholder="e.g., sqrt(16) + 2^3 + sin(pi/2)" style="flex:3;" value="(10+5)*2/3"></div>
        <button class="calc-action" id="evalExpr">Evaluate</button>
        <div class="result-area" id="exprResult">🔬 Result: --</div>
        <div class="panel-desc" style="margin-top:8px;">💡 Examples: 2^3, sqrt(25), sin(30° in rad), log10(100), ln(e), 2*pi</div>
      </div>
    `;
  }
  function attachScientific() {
    const evalBtn = document.getElementById('evalExpr');
    if(evalBtn) {
      evalBtn.addEventListener('click', () => {
        let expr = document.getElementById('exprInput').value;
        try {
          // replace ^ with ** for exponentiation
          expr = expr.replace(/\^/g, '**');
          // allow safe math functions
          const mathContext = {
            sin: Math.sin, cos: Math.cos, tan: Math.tan, asin: Math.asin, acos: Math.acos, atan: Math.atan,
            sqrt: Math.sqrt, log: Math.log10, ln: Math.log, abs: Math.abs, PI: Math.PI, pi: Math.PI, E: Math.E, e: Math.E
          };
          const funcs = Object.keys(mathContext).join(',');
          const evaluator = new Function(...Object.keys(mathContext), `return (${expr});`);
          const result = evaluator(...Object.values(mathContext));
          if(isNaN(result) || !isFinite(result)) throw new Error('Invalid math');
          document.getElementById('exprResult').innerHTML = `🔬 Result: ${formatNumber(result, 6)}`;
        } catch(e) {
          document.getElementById('exprResult').innerHTML = `⚠️ Error: invalid expression. Use *, /, +, -, ^, functions.`;
        }
      });
    }
  }

  // ---- Master render & attach logic ----
  let currentTool = 'bmi';

  function renderTool(toolId) {
    const container = document.getElementById('toolContent');
    if (!container) return;
    switch(toolId) {
      case 'bmi': container.innerHTML = renderBMI(); attachBMI(); break;
      case 'mortgage': container.innerHTML = renderMortgage(); attachMortgage(); break;
      case 'unitconv': container.innerHTML = renderUnitConv(); attachUnitConv(); break;
      case 'currency': container.innerHTML = renderCurrency(); attachCurrency(); break;
      case 'percentage': container.innerHTML = renderPercentage(); attachPercentage(); break;
      case 'scientific': container.innerHTML = renderScientific(); attachScientific(); break;
      default: container.innerHTML = '<div>Tool not found</div>';
    }
    // re-highlight active tab
    document.querySelectorAll('.tool-btn').forEach(btn => {
      if(btn.dataset.tool === toolId) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  function initNavigation() {
    const btns = document.querySelectorAll('.tool-btn');
    btns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const tool = btn.dataset.tool;
        if(tool) {
          currentTool = tool;
          renderTool(currentTool);
        }
      });
    });
  }

  // initial render
  renderTool('bmi');
  initNavigation();
</script>
</body>
</html>
