<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathOS Pro | 60+ Scientific Calculators</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/mathjs@11.8.0/lib/browser/math.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">

<nav class="top-nav">
    <div class="container nav-flex">
        <div class="logo">MathOS<span>Pro</span></div>
        <div class="nav-search">
            <input type="text" id="toolSearch" placeholder="Search all 60 tools..." onkeyup="filterTools()">
            <button id="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        </div>
    </div>
</nav>

<div class="container main-layout">
    <aside id="sidebar">
        <div class="side-card">
            <h3>Calculators</h3>
            <div class="category-list">
                <div class="cat-btn active" onclick="loadGrid('math', this)">Algebra & Math</div>
                <div class="cat-btn" onclick="loadGrid('unit', this)">Unit Converters</div>
                <div class="cat-btn" onclick="loadGrid('engg', this)">Engineering Pro</div>
            </div>
        </div>
    </aside>

    <main>
        <div class="breadcrumb">Home / <span id="current-cat-name">Algebra & Math</span></div>
        <div id="tool-grid" class="grid-container"></div>
    </main>
</div>

<div id="tool-modal" class="modal">
    <div class="modal-window">
        <div class="modal-header">
            <span id="modal-title">Scientific Engine</span>
            <button class="close-btn" onclick="closeTool()">&times;</button>
        </div>

        <div class="modal-body">
            <div class="meter-container">
                <div class="meter-text">Precision Calibration: <span id="meter-val">0%</span></div>
                <div class="meter-track"><div id="meter-bar" class="meter-fill"></div></div>
            </div>

            <div class="display-box">
                <input type="text" id="main-display" placeholder="0">
                <div id="result-preview">Result will appear here</div>
            </div>

            <div id="unit-interface" class="unit-box" style="display:none;">
                <div class="unit-row">
                    <select id="u-from" onchange="runConversion()"></select>
                    <i class="fas fa-exchange-alt"></i>
                    <select id="u-to" onchange="runConversion()"></select>
                </div>
            </div>

            <div id="math-keypad" class="keypad">
                <button class="k-f" onclick="press('sin(')">sin</button>
                <button class="k-f" onclick="press('cos(')">cos</button>
                <button class="k-f" onclick="press('tan(')">tan</button>
                <button class="k-o" onclick="press('(')">(</button>
                <button class="k-o" onclick="press(')')">)</button>
                <button class="k-n" onclick="press('7')">7</button>
                <button class="k-n" onclick="press('8')">8</button>
                <button class="k-n" onclick="press('9')">9</button>
                <button class="k-d" onclick="backspace()">DEL</button>
                <button class="k-o" onclick="press('/')">/</button>
                <button class="k-n" onclick="press('4')">4</button>
                <button class="k-n" onclick="press('5')">5</button>
                <button class="k-n" onclick="press('6')">6</button>
                <button class="k-o" onclick="press('*')">×</button>
                <button class="k-a" onclick="clearDisplay()">AC</button>
                <button class="k-n" onclick="press('1')">1</button>
                <button class="k-n" onclick="press('2')">2</button>
                <button class="k-n" onclick="press('3')">3</button>
                <button class="k-o" onclick="press('-')">-</button>
                <button class="k-e" style="grid-row: span 2;" onclick="solveMath()">=</button>
                <button class="k-n" style="grid-column: span 2;" onclick="press('0')">0</button>
                <button class="k-n" onclick="press('.')">.</button>
                <button class="k-o" onclick="press('+')">+</button>
            </div>
        </div>

        <div class="edu-footer">
            <h4><i class="fas fa-book-open"></i> Theory & Educational Guide</h4>
            <p id="edu-text"></p>
            <div class="formula-box" id="edu-formula"></div>
        </div>
    </div>
</div>

<footer class="main-footer">
    <div class="container">
        <p>&copy; 2026 MathOS Pro | High-Performance Computation</p>
    </div>
</footer>

<script src="app.js"></script>
</body>
</html>
