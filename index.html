<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathOS Pro | Engineering Suite</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="sidebar">
    <div class="logo"><i class="fas fa-microchip"></i> MathOS<span>PRO</span></div>
    <div class="nav-group">
        <div class="nav-item active" onclick="loadGrid('matric', this)">
            <i class="fas fa-graduation-cap"></i><span>Matric</span>
        </div>
        <div class="nav-item" onclick="loadGrid('inter', this)">
            <i class="fas fa-superscript"></i><span>Inter</span>
        </div>
        <div class="nav-item" onclick="loadGrid('engg', this)">
            <i class="fas fa-atom"></i><span>Engg</span>
        </div>
        <div class="nav-item mobile-only" onclick="toggleHistory()">
            <i class="fas fa-history"></i><span>History</span>
        </div>
    </div>
    <div class="sidebar-footer desktop-only">
        <a href="about.html" class="nav-item-link"><i class="fas fa-info-circle"></i> About Us</a>
        <div class="nav-item" onclick="toggleHistory()"><i class="fas fa-history"></i> History</div>
    </div>
</nav>

<main>
    <div class="header">
        <h1 id="section-title">Matric Section</h1>
        <p>Select a specialized tool to open the Scientific Terminal.</p>
    </div>
    
    <div id="tool-grid" class="tool-grid"></div>
    
    <footer>
        <div class="footer-links">
            <a href="#" onclick="showLegal('privacy')">Privacy</a>
            <a href="#" onclick="showLegal('terms')">Terms</a>
            <a href="contact.html">Contact Us</a>
        </div>
        <p>© 2026 MathOS Pro. All systems operational.</p>
    </footer>
</main>

<div id="history-panel" class="history-panel">
    <div class="history-header">
        <h3>History</h3>
        <span onclick="toggleHistory()" class="close-btn">&times;</span>
    </div>
    <div id="history-list"></div>
    <button class="clear-hist" onclick="clearHistory()">Clear All Records</button>
</div>

<div id="tool-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeTool()">&times;</span>
        <h2 id="modal-title">Terminal</h2>
        
        <div id="calculator-ui">
            <div class="calc-display">
                <div id="calc-preview"></div>
                <input type="text" id="main-display" placeholder="0" spellcheck="false">
            </div>

            <div class="sci-keys">
                <button class="key op" onclick="press('sin(')">sin</button>
                <button class="key op" onclick="press('cos(')">cos</button>
                <button class="key op" onclick="press('tan(')">tan</button>
                <button class="key op" onclick="press('log(')">log</button>
                <button class="key op" onclick="press('sqrt(')">√</button>

                <button class="key op" onclick="press('^')">xʸ</button>
                <button class="key op" onclick="press('pi')">π</button>
                <button class="key op" onclick="press('(')">(</button>
                <button class="key op" onclick="press(')')">)</button>
                <button class="key action ac" onclick="clearDisplay()">AC</button>

                <button class="key num" onclick="press('7')">7</button>
                <button class="key num" onclick="press('8')">8</button>
                <button class="key num" onclick="press('9')">9</button>
                <button class="key action del" onclick="backspace()">DEL</button>
                <button class="key op" onclick="press('/')">÷</button>

                <button class="key num" onclick="press('4')">4</button>
                <button class="key num" onclick="press('5')">5</button>
                <button class="key num" onclick="press('6')">6</button>
                <button class="key op" onclick="press('*')">×</button>
                <button class="key op" onclick="press('-')">-</button>

                <button class="key num" onclick="press('1')">1</button>
                <button class="key num" onclick="press('2')">2</button>
                <button class="key num" onclick="press('3')">3</button>
                <button class="key op" onclick="press('+')">+</button>
                <button class="key equal" onclick="solve()">=</button>

                <button class="key num" style="grid-column: span 2;" onclick="press('0')">0</button>
                <button class="key num" onclick="press('.')">.</button>
                <button class="key num" onclick="press(',')">,</button>
            </div>
        </div>

        <div id="legal-ui" style="display:none; max-height: 350px; overflow-y: auto;"></div>
        
        <div class="result-container" id="res-container">
            <button class="copy-btn" onclick="copyResult()"><i class="far fa-copy"></i> Copy Result</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
