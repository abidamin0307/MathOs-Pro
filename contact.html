<!DOCTYPE html>
<html lang="en">

        .page-container { max-width: 600px; margin: 80px auto; padding: 40px; background: var(--card); border-radius: 20px; }

            <label>Email</label><input type="email" placeholder="abidamin0307@gmail.com">

    </div>
